name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Run test suite
        run: |
          rc=0
          for t in tests/test_*.py; do
            echo "::group::$t"
            python3 "$t" || rc=1
            echo "::endgroup::"
          done
          exit $rc
